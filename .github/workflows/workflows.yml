name: Laravel CI/CD – Build, Static Analysis & Tests

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: laravel_test_cicd
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: oraska
      DB_USERNAME: root
      DB_PASSWORD:

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, ctype, fileinfo, pdo_mysql, curl, zip
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Copy .env
        run: cp .env.ci .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Set permissions
        run: |
          mkdir -p storage/framework/{cache,sessions,views}
          chmod -R 775 storage bootstrap/cache

      - name: Prepare testing environment
        run: |
          cp .env.example .env.testing
          php artisan key:generate --env=testing

      - name: Clear Laravel caches
        run: |
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 --silent; do
            sleep 2
          done

      - name: Run Migrations
        run: php artisan migrate --env=testing --force

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse app routes database --level=6 --memory-limit=1G

      - name: Run Tests
        run: php artisan test
